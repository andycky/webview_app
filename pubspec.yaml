publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  webview_flutter: ^4.8.0
  shared_preferences: ^.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^.3.0.1

flutter:
  uses-material-design: true
