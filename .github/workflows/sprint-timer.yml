name: Sprint Timer - 10 Minute Cycle

on:
  workflow_dispatch:
    inputs:
      sprint_number:
        description: 'Sprint Number'
        required: true
        default: '1'
      sprint_goal:
        description: 'Sprint Goal'
        required: true
        default: 'Feature Implementation'
  schedule:
    # Run every 10 minutes (for demo: every hour at :00, :10, :20, :30, :40, :50)
    - cron: '*/10 * * * *'

jobs:
  sprint-timer:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Sprint Info
        id: sprint-info
        run: |
          SPRINT_NUM=$(($(date +%-M) / 10 + 1))
          echo "sprint_number=$SPRINT_NUM" >> $GITHUB_OUTPUT
          echo "start_time=$(date -u +%H:%M:00)" >> $GITHUB_OUTPUT
          echo "end_time=$(date -u -d '+10 minutes' +%H:%M:00)" >> $GITHUB_OUTPUT

      - name: Create Sprint Issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sprintNum = process.env.SPRINT_NUM || '${{ steps.sprint-info.outputs.sprint_number }}';
            const startTime = '${{ steps.sprint-info.outputs.start_time }}';
            const endTime = '${{ steps.sprint-info.outputs.end_time }}';
            
            const goals = [
              'Implement assigned user stories',
              'Commit code to repository',
              'Pass CI build',
              'Complete QA verification'
            ];
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚡ Sprint ${sprintNum} - ${new Date().toISOString().split('T')[0]}`,
              body: `# Sprint ${sprintNum}

            **Duration:** ${startTime} - ${endTime} UTC (10 min)
            **Date:** ${new Date().toISOString().split('T')[0]}
            **Status:** 🟡 In Progress

            ## Goals
            ${goals.map(g => `- [ ] ${g}`).join('\n')}

            ## Timeline
            - [ ] 0:00 - Sprint Start
            - [ ] 2:00 - Planning Complete
            - [ ] 7:00 - Development Complete
            - [ ] 9:00 - Review Complete
            - [ ] 10:00 - Sprint End

            ## Agent Updates
            - **PM Agent:** _Pending_
            - **BA Agent:** _Pending_
            - **Dev Agent:** _Pending_
            - **QA Agent:** _Pending_
            - **Scrum Master:** Sprint initiated

            ## Blockers
            - None reported

            ## Retrospective
            - 🟢 Went well: _Pending_
            - 🔴 Improve: _Pending_
            - 💡 Action: _Pending_

            ---
            *Automated by Scrum Master Agent*`,
              labels: ['sprint', `sprint-${sprintNum}`, 'rapid-scrum']
            });
            
            console.log(`Created Sprint ${sprintNum} issue`);

      - name: Notify Team
        if: always()
        run: |
          echo "⚡ Sprint ${{ steps.sprint-info.outputs.sprint_number }} started!"
          echo "Start: ${{ steps.sprint-info.outputs.start_time }} UTC"
          echo "End: ${{ steps.sprint-info.outputs.end_time }} UTC"
          echo "All agents please report for duty!"
