name: Flutter CI - Build APK

permissions:
  contents: write

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor (sit/uat/prod)'
        required: false
        default: 'prod'
        type: choice
        options:
          - sit
          - uat
          - prod

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
          
      - name: Get Flutter dependencies
        run: |
          flutter pub get
          
      - name: Build APK
        run: |
          echo "Building APK for flavor: prod"
          flutter build apk --flavor prod -t lib/main_prod.dart --release
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-prod
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30
          
      - name: Install jq
        run: sudo apt-get install -y jq
        continue-on-error: true
        
      - name: Upload to Appetize.io
        id: appetize
        if: env.APPETIZE_TOKEN != ''
        env:
          APPETIZE_TOKEN: ${{ secrets.APPETIZE_TOKEN }}
        run: |
          echo "Uploading APK to Appetize.io..."
          RESPONSE=$(curl -s -X POST "https://api.appetize.io/v1/apps" \
            -H "Authorization: Bearer $APPETIZE_TOKEN" \
            -F "file=@build/app/outputs/flutter-apk/app-prod-release.apk" \
            -F "platform=android" \
            -F "note=Build #${{ github.run_number }}")
          
          APP_ID=$(echo $RESPONSE | jq -r '.appId // empty' 2>/dev/null || echo "")
          if [ ! -z "$APP_ID" ]; then
            echo "appetize_url=https://appetize.io/app/$APP_ID" >> $GITHUB_OUTPUT
            echo "SUCCESS: Uploaded to Appetize.io: https://appetize.io/app/$APP_ID"
          else
            echo "WARNING: Appetize upload failed or skipped"
            echo "appetize_url=N/A" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
          
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated release from GitHub Actions
            Build: ${{ github.sha }}
            Appetize: ${{ steps.appetize.outputs.appetize_url || 'N/A' }}
          files: build/app/outputs/flutter-apk/app-prod-release.apk
          token: ${{ secrets.GITHUB_TOKEN }}
