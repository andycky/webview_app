name: Agent Task Assignment

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [opened, labeled]

jobs:
  assign-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Assign Agent based on label
        if: github.event.label.name == 'feature' || github.event.label.name == 'bug' || github.event.label.name == 'user-story'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const label = context.payload.label.name;
            const issueNumber = context.issue.number;
            
            // Assign based on label
            let assignee = 'dev-agent';
            
            if (label === 'user-story') {
              assignee = 'ba-agent';
            } else if (label === 'design') {
              assignee = 'pm-agent';
            } else if (label === 'testing') {
              assignee = 'qa-agent';
            } else if (label === 'sprint-planning') {
              assignee = 'scrum-master-agent';
            }
            
            // Add comment notifying the agent
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `🤖 Assigned to **${assignee}** for processing.`
            });
            
            console.log(`Assigned ${assignee} to issue #${issueNumber}`);
