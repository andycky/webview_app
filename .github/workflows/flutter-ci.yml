name: Flutter CI - Build APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze
        
      - name: Run tests
        run: flutter test
        
      - name: Build APK (SIT)
        run: flutter build apk --flavor sit -t lib/main.dart --release
        env:
          ENV_FILE: .env.sit
          
      - name: Build APK (UAT)
        run: flutter build apk --flavor uat -t lib/main.dart --release
        env:
          ENV_FILE: .env.uat
          
      - name: Build APK (PROD)
        run: flutter build apk --flavor prod -t lib/main.dart --release
        env:
          ENV_FILE: .env.prod
          
      - name: Upload SIT APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-sit-release
          path: build/app/outputs/flutter-apk/app-sit-release.apk
          retention-days: 30
          
      - name: Upload UAT APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-uat-release
          path: build/app/outputs/flutter-apk/app-uat-release.apk
          retention-days: 30
          
      - name: Upload PROD APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-prod-release
          path: build/app/outputs/flutter-apk/app-prod-release.apk
          retention-days: 30
          
      - name: Create GitHub Release (PROD only)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          files: |
            build/app/outputs/flutter-apk/app-prod-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Notify Build Status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Build succeeded!"
          else
            echo "❌ Build failed!"
            exit 1
          fi
